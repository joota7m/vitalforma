    <style>
      /* Estilos para os elementos de conversão */
      #aviso-pre-botao {
        display: block;
        background-color: #1a1a1a;
        color: #cccccc;
        text-align: center;
        padding: 14px 20px;
        border-radius: 8px;

      }

      #checkout-btn-delayed {
        display: none;
        background-color: #CC0000;
        color: white;
        text-align: center;
        padding: 20px;
        border-radius: 8px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 1.2rem;
        text-transform: uppercase;
        text-decoration: none;
        max-width: 600px;
        margin: 20px auto;
        box-shadow: 0 4px 15px rgba(204, 0, 0, 0.3);
        animation: pulse 2s infinite;
      }
      
      @keyframes pulse {
        0%   { transform: scale(1); }
        50%  { transform: scale(1.02); }
        100% { transform: scale(1); }
      }
    </style>

    <!-- Elementos Dinâmicos -->
    <div id="aviso-pre-botao">
        🔒 Mira el video hasta el final para desbloquear tu oferta especial con descuento exclusivo.
    </div>

    <a href="https://pay.hotmart.com/B105620133G" id="checkout-btn-delayed">
        Quiero dejar de sentir dolor ahora
    </a>

    <script>
      (function() {
          const CHECKOUT_TIME = 240; // 4 minutos
          let timerStarted = false;

          function showCheckoutBtn() {
              if (timerStarted) return;
              timerStarted = true;
              const checkoutBtn = document.getElementById('checkout-btn-delayed');
              if (checkoutBtn) {
                  checkoutBtn.style.display = 'block';
              }
          }

          function positionElements() {
              const player = document.querySelector('vturb-smartplayer') || document.querySelector('[id^="vid-"]');
              const aviso = document.getElementById('aviso-pre-botao');
              const checkoutBtn = document.getElementById('checkout-btn-delayed');

              if (player && aviso && checkoutBtn) {
                  const targetContainer = player.closest('.flex.justify-center') || player;
                  
                  if (targetContainer.parentNode) {
                      // Insere o aviso imediatamente ANTES do player
                      if (targetContainer.previousSibling !== aviso) {
                          targetContainer.parentNode.insertBefore(aviso, targetContainer);
                      }
                      
                      // Insere o botão de checkout imediatamente APÓS o player
                      if (targetContainer.nextSibling !== checkoutBtn) {
                          targetContainer.parentNode.insertBefore(checkoutBtn, targetContainer.nextSibling);
                      }
                  }
              }
          }

          // Executa periodicamente a checagem de posicionamento
          setInterval(positionElements, 500);

          // Lógica de delay do Vturb (Método direto)
          const delayInterval = setInterval(() => {
              const player = document.querySelector('vturb-smartplayer') || document.querySelector('smart-video');
              const time = player ? (player.currentTime || (player.video && player.video.currentTime) || 0) : 0;
              if (time >= CHECKOUT_TIME) {
                  showCheckoutBtn();
                  clearInterval(delayInterval);
              }
          }, 1000);

          // Fallback via _smartplayer
          window._smartplayer = window._smartplayer || [];
          window._smartplayer.push(['onTimeUpdate', (time) => {
              if (time >= CHECKOUT_TIME) {
                  showCheckoutBtn();
                  clearInterval(delayInterval);
              }
          }]);

          // Fallback de tempo absoluto: garante que apareça após 4m20s do carregamento, 
          // mesmo que a pessoa pause ou o script do Vturb falhe completamente.
          setTimeout(() => {
              showCheckoutBtn();
              clearInterval(delayInterval);
          }, 260000);

      })();
    </script>
